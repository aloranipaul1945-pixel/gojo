<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOJO SATORU</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    overflow:hidden;
    background:#020617;
}

/* Animated Background */

.container{
    width:100%;
    height:100vh;
    position:relative;
    overflow:hidden;
    background:
    radial-gradient(circle at top,#4c1d95,#020617 60%);
}

/* Floating Particles */

.particles span{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    animation:float 8s linear infinite;
    opacity:0.8;
}

.particles span:nth-child(1){left:10%;animation-duration:6s;}
.particles span:nth-child(2){left:20%;animation-duration:8s;}
.particles span:nth-child(3){left:30%;animation-duration:5s;}
.particles span:nth-child(4){left:40%;animation-duration:9s;}
.particles span:nth-child(5){left:50%;animation-duration:7s;}
.particles span:nth-child(6){left:60%;animation-duration:6s;}
.particles span:nth-child(7){left:70%;animation-duration:10s;}
.particles span:nth-child(8){left:80%;animation-duration:8s;}
.particles span:nth-child(9){left:90%;animation-duration:7s;}

@keyframes float{
    from{
        transform:translateY(100vh) scale(0);
        opacity:0;
    }
    50%{
        opacity:1;
    }
    to{
        transform:translateY(-100vh) scale(1.5);
        opacity:0;
    }
}

/* Navigation */

nav{
    width:100%;
    padding:25px 80px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:absolute;
    z-index:100;
}

.logo{
    color:white;
    font-size:35px;
    font-weight:bold;
    letter-spacing:3px;
    text-shadow:0 0 20px cyan;
}

nav ul{
    display:flex;
    gap:40px;
}

nav ul li{
    list-style:none;
}

nav ul li a{
    color:white;
    text-decoration:none;
    transition:.3s;
}

nav ul li a:hover{
    color:cyan;
    text-shadow:0 0 10px cyan;
}

/* Hero */

.hero{
    display:flex;
    justify-content:space-around;
    align-items:center;
    height:100vh;
    padding:0 100px;
}

.text{
    color:white;
    max-width:500px;
    z-index:10;
}

.text h1{
    font-size:90px;
    line-height:90px;
    text-transform:uppercase;
    animation:glowText 2s infinite alternate;
}

@keyframes glowText{
    from{
        text-shadow:0 0 10px #00ffff;
    }
    to{
        text-shadow:
        0 0 20px cyan,
        0 0 40px cyan,
        0 0 80px cyan;
    }
}

.text p{
    margin:25px 0;
    color:#d1d5db;
    line-height:30px;
}

button{
    padding:15px 40px;
    border:none;
    background:linear-gradient(45deg,#7c3aed,#06b6d4);
    color:white;
    font-size:18px;
    border-radius:50px;
    cursor:pointer;
    transition:.4s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 30px cyan;
}

/* Character Section */

.character{
    position:relative;
}

.character img{
    width: 400px;
    height: 400px;
    border-radius: 50%;
    object-fit: cover;
    z-index: 5;
    position: relative;
    animation: floatGojo 4s ease-in-out infinite;

    border: 4px solid rgba(0,255,255,0.7);
    box-shadow: 0 0 30px cyan;
}
}

/* Floating Animation */

@keyframes floatGojo{
    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-20px);
    }
}

/* Energy Aura */

.aura{
    position:absolute;
    width:550px;
    height:550px;
    background:radial-gradient(
    circle,
    rgba(0,255,255,.6),
    transparent 70%);
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    animation:pulse 3s infinite;
    filter:blur(40px);
}

@keyframes pulse{

    0%{
        transform:translate(-50%,-50%) scale(1);
    }

    50%{
        transform:translate(-50%,-50%) scale(1.2);
    }

    100%{
        transform:translate(-50%,-50%) scale(1);
    }

}

/* Energy Rings */

.ring{
    position:absolute;
    border:2px solid rgba(0,255,255,.5);
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.ring1{
    width:600px;
    height:600px;
    animation:rotate 12s linear infinite;
}

.ring2{
    width:700px;
    height:700px;
    animation:rotateReverse 18s linear infinite;
}

@keyframes rotate{

    from{
        transform:translate(-50%,-50%) rotate(0deg);
    }

    to{
        transform:translate(-50%,-50%) rotate(360deg);
    }

}

@keyframes rotateReverse{

    from{
        transform:translate(-50%,-50%) rotate(360deg);
    }

    to{
        transform:translate(-50%,-50%) rotate(0deg);
    }

}

</style>

</head>
<body>

<div class="container">

<div class="particles">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<nav>
<div class="logo">GOJO</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Powers</a></li>
<li><a href="#">Domain</a></li>
<li><a href="#">Gallery</a></li>
</ul>
</nav>

<section class="hero">

<div class="text">
<h1>Gojo<br>Satoru</h1>

<p>
The strongest Jujutsu Sorcerer.
Master of the Six Eyes and the Infinite Void.
A legend beyond human imagination.
</p>

<button>Unlimited Void</button>

</div>

<div class="character">

<div class="aura"></div>
<div class="ring ring1"></div>
<div class="ring ring2"></div>

<img src="gojo.png" alt="Gojo">

</div>

</section>

</div>

</body>
</html>
