<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>GOJO SATORU</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}
html, body{
    width:100%;
    overflow-x:hidden;
    background:#020617;
}

/* Animated Background */
.container{
    width:100%;
    min-height:100vh;
    min-height:100dvh; /* better mobile viewport handling */
    position:relative;
    overflow:hidden;
    background: radial-gradient(circle at top, #4c1d95, #020617 60%);
}

/* Floating Particles */
.particles{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:1;
}
.particles span{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    animation:float 8s linear infinite;
    opacity:0.8;
}
.particles span:nth-child(1){left:10%;animation-duration:6s;}
.particles span:nth-child(2){left:20%;animation-duration:8s;}
.particles span:nth-child(3){left:30%;animation-duration:5s;}
.particles span:nth-child(4){left:40%;animation-duration:9s;}
.particles span:nth-child(5){left:50%;animation-duration:7s;}
.particles span:nth-child(6){left:60%;animation-duration:6s;}
.particles span:nth-child(7){left:70%;animation-duration:10s;}
.particles span:nth-child(8){left:80%;animation-duration:8s;}
.particles span:nth-child(9){left:90%;animation-duration:7s;}

@keyframes float{
    from{ transform:translateY(100vh) scale(0); opacity:0; }
    50%{ opacity:1; }
    to{ transform:translateY(-100vh) scale(1.5); opacity:0; }
}

/* Navigation */
nav{
    width:100%;
    padding:20px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:relative;
    z-index:100;
}
.logo{
    color:white;
    font-size:clamp(22px, 5vw, 28px);
    font-weight:bold;
    letter-spacing:2px;
    text-shadow:0 0 20px cyan;
}

/* Hamburger button (mobile only) */
.menu-toggle{
    display:none;
    flex-direction:column;
    justify-content:space-between;
    width:28px;
    height:20px;
    background:none;
    border:none;
    cursor:pointer;
    padding:0;
    z-index:200;
}
.menu-toggle span{
    display:block;
    width:100%;
    height:2px;
    background:white;
    border-radius:2px;
    transition:.3s;
}
.menu-toggle.active span:nth-child(1){ transform:translateY(9px) rotate(45deg); }
.menu-toggle.active span:nth-child(2){ opacity:0; }
.menu-toggle.active span:nth-child(3){ transform:translateY(-9px) rotate(-45deg); }

nav ul{
    display:flex;
    gap:clamp(14px, 3vw, 20px);
    list-style:none;
    flex-wrap:wrap;
    justify-content:center;
}
nav ul li a{
    color:white;
    text-decoration:none;
    transition:.3s;
    font-size:16px;
}
nav ul li a:hover{
    color:cyan;
    text-shadow:0 0 10px cyan;
}

/* Hero */
.hero{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:calc(100vh - 80px);
    min-height:calc(100dvh - 80px);
    padding:40px 5% 60px;
    gap:clamp(20px, 5vw, 40px);
    flex-wrap:wrap;
    position:relative;
    z-index:10;
}
.text{
    color:white;
    max-width:500px;
    flex:1 1 320px;
    text-align:center;
}
.text h1{
    font-size: clamp(2.4rem, 9vw, 5.5rem);
    line-height:1.05;
    text-transform:uppercase;
    animation:glowText 2s infinite alternate;
    word-wrap:break-word;
}
@keyframes glowText{
    from{ text-shadow:0 0 10px #00ffff; }
    to{
        text-shadow: 0 0 20px cyan,
                    0 0 40px cyan,
                    0 0 80px cyan;
    }
}
.text p{
    margin:20px auto 25px;
    color:#d1d5db;
    line-height:1.6;
    font-size: clamp(0.95rem, 3.6vw, 1.25rem);
    max-width:450px;
}
button{
    padding:14px 35px;
    border:none;
    background:linear-gradient(45deg,#7c3aed,#06b6d4);
    color:white;
    font-size: clamp(1rem, 3.6vw, 1.25rem);
    border-radius:50px;
    cursor:pointer;
    transition:.4s;
    display:block;
    margin:0 auto;
    -webkit-tap-highlight-color:transparent;
}
button:hover, button:active{
    transform:scale(1.05);
    box-shadow:0 0 30px cyan;
}

/* Character */
.character{
    position:relative;
    flex:1 1 280px;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:280px;
}
.character img{
    width:280px;
    height:280px;
    max-width:70vw;
    max-height:70vw;
    border-radius:50%;
    object-fit:cover;
    z-index:5;
    position:relative;
    animation:floatGojo 4s ease-in-out infinite;
    border:4px solid rgba(0,255,255,0.7);
    box-shadow:0 0 30px cyan;
}

@keyframes floatGojo{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-20px); }
}

/* Energy Effects */
.aura{
    position:absolute;
    width:min(380px, 90vw);
    height:min(380px, 90vw);
    background:radial-gradient(circle, rgba(0,255,255,.6), transparent 70%);
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    animation:pulse 3s infinite;
    filter:blur(30px);
    z-index:3;
}
.ring{
    position:absolute;
    border:2px solid rgba(0,255,255,.5);
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}
.ring1{
    width:min(420px, 95vw);
    height:min(420px, 95vw);
    animation:rotate 12s linear infinite;
}
.ring2{
    width:min(480px, 100vw);
    height:min(480px, 100vw);
    animation:rotateReverse 18s linear infinite;
}

@keyframes pulse{
    0%,100%{ transform:translate(-50%,-50%) scale(1); }
    50%{ transform:translate(-50%,-50%) scale(1.25); }
}
@keyframes rotate{
    from{ transform:translate(-50%,-50%) rotate(0deg); }
    to{ transform:translate(-50%,-50%) rotate(360deg); }
}
@keyframes rotateReverse{
    from{ transform:translate(-50%,-50%) rotate(360deg); }
    to{ transform:translate(-50%,-50%) rotate(0deg); }
}

/* Tablet & below: collapsible nav */
@media (max-width: 768px){
    .menu-toggle{ display:flex; }

    nav ul{
        position:absolute;
        top:100%;
        left:0;
        width:100%;
        flex-direction:column;
        align-items:center;
        background:rgba(2,6,23,0.95);
        backdrop-filter:blur(6px);
        max-height:0;
        overflow:hidden;
        transition:max-height .35s ease, padding .35s ease;
        padding:0 5%;
        gap:0;
    }
    nav ul.open{
        max-height:300px;
        padding:20px 5%;
        gap:18px;
    }

    .hero{ padding-top:30px; }
}

@media (max-width: 480px){
    .text h1{ font-size:clamp(2.2rem, 11vw, 3.2rem); }
    .character{ min-height:220px; }
}

/* Large screens: cap sizes so it doesn't feel sparse */
@media (min-width: 1400px){
    .hero{ max-width:1400px; margin:0 auto; }
}

/* Respect reduced motion preference */
@media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; }
}
</style>
</head>
<body>
<div class="container">
    <div class="particles">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
    </div>

    <nav>
        <div class="logo">GOJO</div>
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <ul id="navList">
            <li><a href="#">Home</a></li>
            <li><a href="#">Powers</a></li>
            <li><a href="#">Domain</a></li>
            <li><a href="#">Gallery</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="text">
            <h1>Gojo<br>Satoru</h1>
            <p>
                The strongest Jujutsu Sorcerer.<br>
                Master of the Six Eyes and the Infinite Void.<br>
                A legend beyond human imagination.
            </p>
            <button>Unlimited Void</button>
        </div>

        <div class="character">
            <div class="aura"></div>
            <div class="ring ring1"></div>
            <div class="ring ring2"></div>
            <img src="gojo.png" alt="Gojo Satoru">
        </div>
    </section>
</div>

<script>
    const toggle = document.getElementById('menuToggle');
    const navList = document.getElementById('navList');

    toggle.addEventListener('click', () => {
        const isOpen = navList.classList.toggle('open');
        toggle.classList.toggle('active');
        toggle.setAttribute('aria-expanded', isOpen);
    });

    // Close menu when a link is tapped (mobile)
    navList.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            navList.classList.remove('open');
            toggle.classList.remove('active');
            toggle.setAttribute('aria-expanded', 'false');
        });
    });
</script>
</body>
</html>
